apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-v4 # Nombre normalizado
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mi-web
      version: v4 # Etiqueta coincidente con Istio
  template:
    metadata:
      labels:
        app: mi-web
        version: v4
    spec:
      containers:
      - name: nginx
        image: wfuentes/mi-web:v4
        imagePullPolicy: Always
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
